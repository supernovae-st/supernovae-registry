name: "@mcp/kubernetes"
version: "1.0.0"
type: mcp
description: "Kubernetes cluster management - pods, deployments, and services"
author: "community"
license: "MIT"
homepage: "https://github.com/kubernetes/mcp-server-kubernetes"
tags: ["kubernetes", "k8s", "containers", "devops", "orchestration"]

source:
  type: npm
  package: "mcp-server-kubernetes"
  version: "^1.0.0"

mcp:
  tools:
    - name: list_pods
      description: "List pods"
    - name: get_pod
      description: "Get pod details"
    - name: list_deployments
      description: "List deployments"
    - name: scale_deployment
      description: "Scale deployment"
    - name: list_services
      description: "List services"
    - name: get_logs
      description: "Get pod logs"
    - name: exec_command
      description: "Execute command in pod"
    - name: apply_manifest
      description: "Apply YAML manifest"
    - name: delete_resource
      description: "Delete resource"
  args:
    - name: kubeconfig
      required: false
      description: "Path to kubeconfig file"
    - name: context
      required: false
      description: "Kubernetes context to use"
