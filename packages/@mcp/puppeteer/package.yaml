name: "@mcp/puppeteer"
version: "1.0.0"
type: mcp
description: "Browser automation with Puppeteer - screenshots, navigation, and interaction"
author: "anthropic"
license: "MIT"
homepage: "https://github.com/modelcontextprotocol/servers"
tags: ["browser", "puppeteer", "automation", "screenshot", "scraping"]

source:
  type: npm
  package: "@modelcontextprotocol/server-puppeteer"
  version: "^0.6.0"

mcp:
  tools:
    - name: puppeteer_navigate
      description: "Navigate to a URL"
    - name: puppeteer_screenshot
      description: "Take a screenshot"
    - name: puppeteer_click
      description: "Click an element"
    - name: puppeteer_fill
      description: "Fill a form field"
    - name: puppeteer_select
      description: "Select dropdown option"
    - name: puppeteer_hover
      description: "Hover over element"
    - name: puppeteer_evaluate
      description: "Execute JavaScript"
  resources:
    - name: "console://logs"
      description: "Browser console logs"
    - name: "screenshot://current"
      description: "Current page screenshot"
