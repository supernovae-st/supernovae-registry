name: "@mcp/stripe"
version: "1.0.0"
type: mcp
description: "Stripe payments API - customers, subscriptions, invoices, and more"
author: "stripe"
license: "MIT"
homepage: "https://github.com/stripe/mcp-server-stripe"
tags: ["stripe", "payments", "billing", "subscriptions", "invoices"]

source:
  type: npm
  package: "@stripe/mcp-server-stripe"
  version: "^0.1.0"

mcp:
  tools:
    - name: list_customers
      description: "List customers"
    - name: create_customer
      description: "Create customer"
    - name: get_customer
      description: "Get customer details"
    - name: list_subscriptions
      description: "List subscriptions"
    - name: create_subscription
      description: "Create subscription"
    - name: list_invoices
      description: "List invoices"
    - name: create_payment_link
      description: "Create payment link"
    - name: list_products
      description: "List products"
    - name: list_prices
      description: "List prices"
  env_vars:
    - name: STRIPE_SECRET_KEY
      required: true
      secret: true
      description: "Stripe secret key"
