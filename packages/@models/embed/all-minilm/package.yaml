name: "@models/embed/all-minilm"
version: "1.0.0"
type: model
description: "All-MiniLM - fast and lightweight sentence embeddings"
author: "sentence-transformers"
license: "Apache-2.0"
homepage: "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2"
tags: ["embeddings", "fast", "lightweight", "sentences"]

source:
  type: ollama
  model: "all-minilm"

model:
  category: embed
  variants:
    - name: "default"
      ollama: "all-minilm"
      size: "46MB"
      vram: "128MB"
      dimensions: 384
      best_for: "Fast, lightweight embeddings"

  benchmarks:
    mteb_avg: 56.8

  capabilities:
    - text-embeddings
    - sentence-embeddings
    - semantic-search

  recommended_for:
    - "Resource-constrained environments"
    - "Fast inference"
    - "Simple similarity tasks"

  context_length: 256
