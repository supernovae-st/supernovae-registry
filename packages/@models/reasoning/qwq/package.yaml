    gpqa: 65.2

  capabilities:
    - deep-thinking
    - mathematical-reasoning
    - analytical-reasoning
    - problem-decomposition

  recommended_for:
    - "Complex analysis"
    - "Mathematical proofs"
    - "Strategic planning"
    - "Research questions"

  features:
    - "Extended thinking time"
    - "Self-reflection"
    - "Multi-perspective analysis"
