name: "@models/reasoning/qwq"
version: "1.0.0"
type: model
description: "QwQ - Alibaba's reasoning model with deep thinking capabilities"
author: "alibaba"
license: "Apache-2.0"
homepage: "https://github.com/QwenLM/Qwen2.5"
tags: ["reasoning", "thinking", "math", "analysis"]

source:
  type: ollama
  model: "qwq"

model:
  category: reasoning
  variants:
